name: Lighthouse CI

# Runs on PRs that touch the Astro marketing site or its content. Asserts
# Core Web Vitals + perf/SEO thresholds on the static build. Vue-only PRs
# are skipped so the main CI pipeline stays fast.

on:
  pull_request:
    paths:
      - 'web/**'
      - 'content/blog/**'
      - 'content/guides/**'
      - 'packages/**'
      - '.github/workflows/lighthouse-ci.yml'
  workflow_dispatch:

jobs:
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build Astro site
        run: npm run build:web

      - name: Run Lighthouse CI
        run: npx --workspace=web @lhci/cli@0.15 autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
